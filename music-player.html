<!-- 音乐播放器组件 - 可嵌入到任何页面 -->
<!-- 使用方法：在页面的 </body> 标签前引入此文件 -->

<style>
    /* 音乐播放器样式 */
    .music-player {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999;
    }

    .music-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--primary, #6366f1), var(--accent, #ec4899));
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 5px 20px rgba(99,102,241,0.4);
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }

    .music-btn::before {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.3);
        animation: musicPulse 2s ease-in-out infinite;
    }

    @keyframes musicPulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.5; }
    }

    .music-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 10px 30px rgba(99,102,241,0.6);
    }

    .music-btn svg {
        width: 28px;
        height: 28px;
        fill: #fff;
    }

    .music-btn.playing svg {
        animation: musicBeat 1s ease-in-out infinite;
    }

    @keyframes musicBeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
    }

    /* 播放列表 */
    .playlist {
        position: fixed;
        bottom: 100px;
        right: 30px;
        width: 280px;
        background: rgba(15,15,26,0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 20px;
        z-index: 9998;
        opacity: 0;
        visibility: hidden;
        transform: translateY(20px);
        transition: all 0.3s;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .playlist.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .playlist-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .playlist-title {
        font-size: 16px;
        font-weight: 600;
        color: #fff;
    }

    .playlist-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.5);
        cursor: pointer;
        font-size: 20px;
        transition: color 0.3s;
    }

    .playlist-close:hover {
        color: #fff;
    }

    .playlist-items {
        max-height: 300px;
        overflow-y: auto;
    }

    .playlist-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.3s;
        margin-bottom: 8px;
    }

    .playlist-item:hover {
        background: rgba(255,255,255,0.1);
    }

    .playlist-item.active {
        background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(236,72,153,0.3));
        border: 1px solid rgba(99,102,241,0.5);
    }

    .playlist-item-icon {
        width: 40px;
        height: 40px;
        border-radius: 8px;
        background: linear-gradient(135deg, var(--primary, #6366f1), var(--accent, #ec4899));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
    }

    .playlist-item-info {
        flex: 1;
        overflow: hidden;
    }

    .playlist-item-title {
        font-size: 14px;
        font-weight: 500;
        color: #fff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .playlist-item-artist {
        font-size: 12px;
        color: rgba(255,255,255,0.5);
        margin-top: 4px;
    }

    .playlist-item-playing {
        display: flex;
        align-items: center;
        gap: 3px;
    }

    .playlist-item-playing span {
        width: 3px;
        height: 15px;
        background: var(--accent, #ec4899);
        border-radius: 2px;
        animation: equalizer 0.5s ease-in-out infinite;
    }

    .playlist-item-playing span:nth-child(2) { animation-delay: 0.1s; }
    .playlist-item-playing span:nth-child(3) { animation-delay: 0.2s; }
    .playlist-item-playing span:nth-child(4) { animation-delay: 0.3s; }

    @keyframes equalizer {
        0%, 100% { height: 15px; }
        50% { height: 8px; }
    }

    /* 音量控制 */
    .volume-control {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid rgba(255,255,255,0.1);
    }

    .volume-icon {
        color: rgba(255,255,255,0.5);
        font-size: 16px;
    }

    .volume-slider {
        flex: 1;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 2px;
        background: rgba(255,255,255,0.2);
        outline: none;
        cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent, #ec4899);
        cursor: pointer;
        transition: all 0.3s;
    }

    .volume-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
    }

    .volume-slider::-webkit-slider-runnable-track {
        background: linear-gradient(to right, var(--primary, #6366f1), var(--accent, #ec4899));
        border-radius: 2px;
    }

    /* 滚动条样式 */
    .playlist-items::-webkit-scrollbar {
        width: 6px;
    }

    .playlist-items::-webkit-scrollbar-track {
        background: rgba(255,255,255,0.05);
        border-radius: 3px;
    }

    .playlist-items::-webkit-scrollbar-thumb {
        background: rgba(255,255,255,0.2);
        border-radius: 3px;
    }

    .playlist-items::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.3);
    }

    /* 响应式 */
    @media (max-width: 768px) {
        .music-player {
            bottom: 20px;
            right: 20px;
        }

        .playlist {
            bottom: 90px;
            right: 20px;
            width: calc(100% - 40px);
        }
    }
</style>

<!-- 音乐播放器 HTML -->
<div class="music-player">
    <!-- 播放列表 -->
    <div class="playlist" id="playlist">
        <div class="playlist-header">
            <span class="playlist-title">🎵 播放列表</span>
            <button class="playlist-close" onclick="togglePlaylist()">×</button>
        </div>
        <div class="playlist-items" id="playlist-items">
            <!-- 播放列表项将由 JavaScript 动态生成 -->
        </div>
        <div class="volume-control">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
        </div>
    </div>
    
    <!-- 播放按钮 -->
    <button class="music-btn" id="music-btn" onclick="toggleMusic()" title="播放/暂停音乐">
        <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
        </svg>
    </button>
</div>

<!-- 音频元素 -->
<audio id="audio-player"></audio>

<script>
    // 音乐播放器配置
    const musicConfig = {
        // 在这里添加您的音乐文件
        // 支持本地文件和在线 URL
        playlist: [
            {
                title: "起风了",
                artist: "买辣椒也用券",
                src: "music/qifengle.mp3",
                icon: "🎤"
            },
            {
                title: "少年",
                artist: "梦然",
                src: "music/shaonian.mp3",
                icon: "🎸"
            },
            {
                title: "夜空中最亮的星",
                artist: "逃跑计划",
                src: "music/yekong.mp3",
                icon: "⭐"
            },
            {
                title: "晴天",
                artist: "周杰伦",
                src: "music/qingtian.mp3",
                icon: "🌤️"
            },
            {
                title: "后来",
                artist: "刘若英",
                src: "music/houlai.mp3",
                icon: "💕"
            },
            {
                title: "那些花儿",
                artist: "朴树",
                src: "music/naxiehuaer.mp3",
                icon: "🌸"
            },
            {
                title: "同桌的你",
                artist: "老狼",
                src: "music/tongzhuo.mp3",
                icon: "📚"
            },
            {
                title: "北京东路的日子",
                artist: "毕业歌",
                src: "music/beijingdonglu.mp3",
                icon: "🎓"
            }
        ]
    };

    // 播放器状态
    let isPlaying = false;
    let currentTrackIndex = 0;
    let isPlaylistVisible = false;

    // 初始化
    const audioPlayer = document.getElementById('audio-player');
    const musicBtn = document.getElementById('music-btn');
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    const playlist = document.getElementById('playlist');
    const playlistItems = document.getElementById('playlist-items');
    const volumeSlider = document.getElementById('volume-slider');

    // 初始化音量
    audioPlayer.volume = volumeSlider.value / 100;

    // 渲染播放列表
    function renderPlaylist() {
        playlistItems.innerHTML = '';
        musicConfig.playlist.forEach((track, index) => {
            const item = document.createElement('div');
            item.className = 'playlist-item' + (index === currentTrackIndex ? ' active' : '');
            item.onclick = () => playTrack(index);
            item.innerHTML = `
                <div class="playlist-item-icon">${track.icon}</div>
                <div class="playlist-item-info">
                    <div class="playlist-item-title">${track.title}</div>
                    <div class="playlist-item-artist">${track.artist}</div>
                </div>
                ${index === currentTrackIndex && isPlaying ? `
                    <div class="playlist-item-playing">
                        <span></span><span></span><span></span><span></span>
                    </div>
                ` : ''}
            `;
            playlistItems.appendChild(item);
        });
    }

    // 播放指定曲目
    function playTrack(index) {
        currentTrackIndex = index;
        const track = musicConfig.playlist[index];
        audioPlayer.src = track.src;
        audioPlayer.play();
        isPlaying = true;
        updateUI();
        renderPlaylist();
    }

    // 切换播放/暂停
    function toggleMusic() {
        if (!audioPlayer.src) {
            playTrack(currentTrackIndex);
            return;
        }
        
        if (isPlaying) {
            audioPlayer.pause();
            isPlaying = false;
        } else {
            audioPlayer.play();
            isPlaying = true;
        }
        updateUI();
        renderPlaylist();
    }

    // 更新 UI
    function updateUI() {
        if (isPlaying) {
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
            musicBtn.classList.add('playing');
        } else {
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            musicBtn.classList.remove('playing');
        }
    }

    // 切换播放列表显示
    function togglePlaylist() {
        isPlaylistVisible = !isPlaylistVisible;
        if (isPlaylistVisible) {
            playlist.classList.add('show');
            renderPlaylist();
        } else {
            playlist.classList.remove('show');
        }
    }

    // 点击按钮显示播放列表
    musicBtn.addEventListener('click', (e) => {
        if (!isPlaylistVisible) {
            e.stopPropagation();
            togglePlaylist();
        }
    });

    // 音量控制
    volumeSlider.addEventListener('input', (e) => {
        audioPlayer.volume = e.target.value / 100;
    });

    // 自动播放下一首
    audioPlayer.addEventListener('ended', () => {
        currentTrackIndex = (currentTrackIndex + 1) % musicConfig.playlist.length;
        playTrack(currentTrackIndex);
    });

    // 错误处理
    audioPlayer.addEventListener('error', (e) => {
        console.log('音乐播放错误:', e);
        // 尝试播放下一首
        currentTrackIndex = (currentTrackIndex + 1) % musicConfig.playlist.length;
        playTrack(currentTrackIndex);
    });

    // 点击其他地方关闭播放列表
    document.addEventListener('click', (e) => {
        if (isPlaylistVisible && !playlist.contains(e.target) && e.target !== musicBtn) {
            togglePlaylist();
        }
    });

    // 初始渲染
    renderPlaylist();
</script>
