<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业合影 - 班级回忆录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #1e1b4b;
            --light: #f8fafc;
        }
        
        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
        }
        
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a3e 50%, #2d1b4e 100%);
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            font-size: 16px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(-5px);
        }
        
        .back-btn svg {
            width: 20px;
            height: 20px;
        }
        
        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 40px 60px;
        }
        
        /* 照片展示区 */
        .photo-showcase {
            text-align: center;
            margin-bottom: 60px;
        }
        
        .photo-main {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(99,102,241,0.3);
        }
        
        .photo-placeholder {
            font-size: 80px;
            opacity: 0.5;
        }
        
        .photo-title {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(28px, 5vw, 48px);
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .photo-status {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(236,72,153,0.2);
            border: 1px solid var(--accent);
            border-radius: 20px;
            color: var(--accent);
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        /* 描述区域 */
        .description {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        
        .description h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--primary);
        }
        
        .description p {
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
            font-size: 16px;
        }
        
        /* 照片网格 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .photo-thumb {
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.3));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .photo-thumb:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 60px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 80px 20px 40px;
            }
            
            .back-btn {
                top: 20px;
                left: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
    </a>
    
    <div class="container">
        <div class="photo-showcase">
            <div class="photo-main">
                <div class="photo-placeholder">📷</div>
            </div>
            <h1 class="photo-title">毕业合影</h1>
            <span class="photo-status">⏳ 待拍摄</span>
        </div>
        
        <div class="description">
            <h2>📝 照片介绍</h2>
            <p>
                这张毕业合影还在等待我们的定格。期待在毕业那天，我们穿上学士服，
                在阳光下留下最灿烂的笑容。每一张笑脸，都是青春最美的模样。
            </p>
            <p style="margin-top: 20px;">
                📍 拍摄地点：学校操场<br>
                📅 预计拍摄时间：2026 年 6 月
            </p>
        </div>
        
        <div class="description">
            <h2>🖼️ 更多瞬间</h2>
            <div class="photo-grid">
                <div class="photo-thumb">🎓</div>
                <div class="photo-thumb">👨‍🎓</div>
                <div class="photo-thumb">👩‍🎓</div>
                <div class="photo-thumb">✨</div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>© 2026 深圳实验学校 2026 级 8 班 | 青春不散场</p>
    </footer>
</body>
</html>
