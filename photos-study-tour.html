<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研学之旅 - 班级回忆录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #10b981; --secondary: #34d399; --accent: #f59e0b; --dark: #1e1b4b; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', 'Microsoft YaHei', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a3e 50%, #2d1b4e 100%); }
        .bg-animation::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%); animation: rotate 30s linear infinite; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
        .particle { position: absolute; width: 4px; height: 4px; background: rgba(16,185,129,0.6); border-radius: 50%; animation: float 15s infinite; box-shadow: 0 0 10px rgba(16,185,129,0.8); }
        @keyframes float { 0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; } }
        .back-btn { position: fixed; top: 30px; left: 30px; z-index: 1000; display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 16px; padding: 12px 20px; background: rgba(255,255,255,0.05); border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); transition: all 0.4s; }
        .back-btn:hover { background: rgba(255,255,255,0.15); transform: translateX(-8px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(16,185,129,0.3); }
        .back-btn svg { width: 20px; height: 20px; transition: transform 0.4s; }
        .back-btn:hover svg { transform: translateX(-3px); }
        .container { max-width: 1200px; margin: 0 auto; padding: 120px 40px 60px; }
        .photo-showcase { text-align: center; margin-bottom: 80px; opacity: 0; transform: translateY(50px); animation: fadeInUp 1s ease 0.2s forwards; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        .photo-main { width: 100%; max-width: 900px; aspect-ratio: 16/9; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 25px; margin: 0 auto 40px; overflow: hidden; box-shadow: 0 40px 80px rgba(16,185,129,0.4); position: relative; transition: all 0.5s; }
        .photo-main:hover { transform: scale(1.02); box-shadow: 0 50px 100px rgba(16,185,129,0.5); }
        .photo-main img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s; }
        .photo-main:hover img { transform: scale(1.1); }
        .photo-main::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.3) 100%); pointer-events: none; }
        .photo-main::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shine 3s infinite; }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }
        .photo-title { font-family: 'Noto Serif SC', serif; font-size: clamp(32px, 6vw, 56px); font-weight: 700; margin-bottom: 20px; background: linear-gradient(135deg, #fff 0%, #6ee7b7 50%, #a7f3d0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: titleGlow 3s ease-in-out infinite; }
        @keyframes titleGlow { 0%, 100% { filter: drop-shadow(0 0 20px rgba(16,185,129,0.5)); } 50% { filter: drop-shadow(0 0 40px rgba(16,185,129,0.8)); } }
        .photo-status { display: inline-block; padding: 10px 25px; background: rgba(16,185,129,0.15); border: 2px solid var(--primary); border-radius: 30px; color: var(--primary); font-size: 15px; letter-spacing: 2px; font-weight: 600; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 50% { box-shadow: 0 0 0 15px rgba(16,185,129,0); } }
        .description { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 25px; padding: 50px; margin-bottom: 40px; backdrop-filter: blur(20px); opacity: 0; transform: translateY(40px); animation: fadeInUp 1s ease 0.5s forwards; transition: all 0.4s; position: relative; overflow: hidden; }
        .description::before { content: ''; position: absolute; top: 0; left: 0; width: 5px; height: 100%; background: linear-gradient(180deg, var(--primary), var(--secondary)); }
        .description:hover { background: rgba(255,255,255,0.06); transform: translateY(-5px); box-shadow: 0 20px 50px rgba(16,185,129,0.2); }
        .description h2 { font-size: 28px; margin-bottom: 25px; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: inline-block; position: relative; }
        .description h2::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 60px; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); border-radius: 3px; }
        .description p { color: rgba(255,255,255,0.75); line-height: 2; font-size: 17px; margin-bottom: 15px; }
        .highlight { display: inline-block; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 600; animation: highlightPulse 2s infinite; }
        @keyframes highlightPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; margin-top: 30px; }
        .info-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; text-align: center; transition: all 0.4s; opacity: 0; transform: translateY(30px); }
        .info-card:nth-child(1) { animation: fadeInUp 0.8s ease 0.7s forwards; }
        .info-card:nth-child(2) { animation: fadeInUp 0.8s ease 0.8s forwards; }
        .info-card:nth-child(3) { animation: fadeInUp 0.8s ease 0.9s forwards; }
        .info-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(16,185,129,0.3); }
        .info-icon { font-size: 36px; margin-bottom: 15px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .info-label { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 18px; font-weight: 600; color: #fff; }
        footer { text-align: center; padding: 50px 40px; color: rgba(255,255,255,0.5); border-top: 1px solid rgba(255,255,255,0.05); margin-top: 60px; }
        footer p { font-size: 14px; }
        .progress-bar { position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent)); z-index: 9999; transition: width 0.1s; }
        @media (max-width: 768px) { .container { padding: 100px 20px 40px; } .back-btn { top: 20px; left: 20px; padding: 10px 15px; font-size: 14px; } .description { padding: 30px 20px; } .photo-main { border-radius: 15px; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>
    <div class="progress-bar" id="progress-bar"></div>
    
    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        返回首页
    </a>
    
    <div class="container">
        <div class="photo-showcase">
            <div class="photo-main">
                <img src="images/study-tour.jpg" alt="研学之旅">
            </div>
            <h1 class="photo-title">🚌 研学之旅</h1>
            <span class="photo-status">🎒 研学活动</span>
        </div>
        
        <div class="description">
            <h2>📝 回忆记录</h2>
            <p>
                <span class="highlight">读万卷书，行万里路</span>。我们走出校园，踏上研学的旅程。
            </p>
            <p>
                一路上，我们参观博物馆，感受历史的厚重；走进科技馆，体验科技的魅力；
                探访名胜古迹，领略文化的博大精深。每一次驻足，都是成长；每一张照片，都是收获。
            </p>
            <p>
                还记得大巴车上的欢声笑语，记得和同学们一起探索新知的兴奋，
                记得分享零食时的快乐，记得返程时疲惫却满足的笑脸...
                这些点点滴滴，都是青春最美的模样。
            </p>
            
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-icon">📍</div>
                    <div class="info-label">目的地</div>
                    <div class="info-value">研学基地</div>
                </div>
                <div class="info-card">
                    <div class="info-icon">👫</div>
                    <div class="info-label">同行</div>
                    <div class="info-value">全班同学</div>
                </div>
                <div class="info-card">
                    <div class="info-icon">📸</div>
                    <div class="info-label">收获</div>
                    <div class="info-value">满满回忆</div>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>© 2026 立格实验学校 2026 级 8 班 | 青春不散场 · 我们永远是一家人</p>
    </footer>
    
    <script>
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        window.addEventListener('scroll', () => {
            const progressBar = document.getElementById('progress-bar');
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercent = (scrollTop / docHeight) * 100;
            progressBar.style.width = scrollPercent + '%';
        });
    </script>

    <!-- 音乐播放器 -->
    <link rel="stylesheet" href="css/music-player.css">
    <script src="js/music-player.js"></script>
</body>
</html>
